name: video_hub
description: "Video Player App To Run All Videos On The Device And Recording Too"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  gap: ^3.0.1
  flutter_bloc: ^9.1.1
  smooth_page_indicator: ^2.0.1
  image_picker: ^1.2.1
  disk_space_plus: ^0.2.6
  video_player: ^2.11.1
  photo_manager: ^3.9.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/