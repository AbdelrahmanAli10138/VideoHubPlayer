name: video_hub
description: "Video Player App To Run All Videos On The Device And Recording Too"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  gap: ^3.0.1
  flutter_bloc: ^9.1.1
  smooth_page_indicator: ^2.0.1
  image_picker: ^1.2.1
  disk_space_plus: ^0.2.6
  video_player: ^2.11.1
  photo_manager: ^3.9.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4
  photo_manager_image_provider: ^2.2.0
  flutter_launcher_icons: ^0.14.4
  url_launcher: ^6.3.2
  flick_video_player: ^0.9.0

flutter_launcher_icons:
  android: "launcher_icon"
  image_ratio_android: 0.85
  ios: true
  image_path: "assets/images/yellowLogo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/yellowLogo.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/images/yellowLogo.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/images/yellowLogo.png"
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/